name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SOLANA_VERSION: '4.0.0'

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          install-solana: 'false'
          rust-cache-key: 'unit-test'
          save-rust-cache: 'true'

      - name: Run unit tests
        run: just unit-test

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          rust-cache-key: 'integration-test'
          solana-version: ${{ env.SOLANA_VERSION }}

      - name: Run integration tests
        run: just integration-test
