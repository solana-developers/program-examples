[toolchain]
solana_version = "3.1.8"

[features]
resolution = true
skip-lint = false

[programs.devnet]
swap_example = "AsGVFxWqEn8icRBFQApxJe68x3r9zvfSbmiEzYFATGYn"

# [registry] section removed — no longer used in Anchor 1.0

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "cargo test"

[test]
startup_wait = 5000
shutdown_wait = 2000
