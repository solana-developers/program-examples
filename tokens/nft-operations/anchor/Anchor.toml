[toolchain]
solana_version = "3.1.8"

[features]
seeds = false
skip-lint = false

[programs.localnet]
mint_nft = "3EMcczaGi9ivdLxvvFwRbGYeEUEHpGwabXegARw4jLxa"

[programs.devnet]
mint_nft = "3EMcczaGi9ivdLxvvFwRbGYeEUEHpGwabXegARw4jLxa"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

# This project has BOTH bankrun tests AND validator tests (mint-nft.ts).
# The validator tests need Metaplex Token Metadata cloned from mainnet.
# startup_wait is high because cloning from mainnet is slow in CI.
[test]
startup_wait = 300000

[scripts]
test = "pnpm ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test.validator]
url = "https://api.mainnet-beta.solana.com"

[[test.validator.clone]]
address = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"
