[package]
name = "metadata"
version = "0.1.0"
description = "Created with Anchor"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "metadata"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]
anchor-debug = []
custom-heap = []
custom-panic = []

[dependencies]
anchor-lang = "1.0.0-rc.5"  # Anchor 1.0.0-rc.5 — pin to RC until stable release
anchor-spl = "1.0.0-rc.5"  # Anchor 1.0.0-rc.5 — pin to RC until stable release
spl-token-metadata-interface = "0.3.3"
spl-type-length-value = "0.4.3"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(target_os, values("solana"))'] }
