[toolchain]
solana_version = "3.1.8"

[features]
resolution = true
skip-lint = false

[hooks]
# program keypairs are committed under keypairs/ so ids stay stable (declare_program! bakes the lever id); stage them before each build
pre_build = "mkdir -p target/deploy && cp keypairs/*.json target/deploy/"

[programs.localnet]
hand = "59c3ER1YrnnnezUVH7ix4WDUw9TQ9k7xH6wQyAmWvc52"
lever = "A6GUsa5Ej8iWzMMP3B6otFVB5aaUckVm8a31Y5TMLYRV"

# [registry] section removed — no longer used in Anchor 1.0

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
